# ============================================================
# SURI Domain Glossary v1.1
# ============================================================
# 한국 생명보험 도메인 표준 용어 사전
# Agent가 get_domain_term() MCP tool로 필요 시 retrieve.
#
# 설계 원칙:
# 1. 자체 작성 정의 제로. 모든 정의는 권위 있는 1차 출처 인용.
# 2. 정의의 신뢰도를 3등급으로 구분 (official / industry / poc_proxy).
# 3. 출처는 primary(법령·기준서) / secondary(연구·공시) 분리.
# 4. 본 PoC 데이터 한계를 명시 (산출 불가 지표는 불가 사유 기록).
# 5. 면접 방어 가능한 근거 위주. 단정적 표현 지양.
#
# 감수: 2026-04-23 4-AI 교차검증 (ChatGPT / Claude / Perplexity / Gemini)
# ============================================================

meta:
  version: "1.1"
  작성일: "2026-04-23"
  감수: "4-AI 교차검증 (ChatGPT, Claude, Perplexity, Gemini)"

  definition_tiers:
    official_definition: "법령·기준서·협회 공시 기준"
    industry_convention: "업계 IR·리서치에서 널리 쓰이는 실무 관행"
    poc_proxy_or_assumption: "본 PoC에서만 쓰는 근사치 또는 가정"

  source_tiers:
    primary: "법령·기준서 원문 (반박 불가)"
    secondary: "업계 리서치·공시 해설 자료 (맥락 제공)"


# ============================================================
# A. 유지·해지
# ============================================================

유지율:
  en: persistency rate
  tier: official_definition

  standard_definition: |
    신계약 코호트 중 N회차 시점에 유효하게 유지되고 있는 계약의 비율.
    회차별로 서로 다른 신계약 코호트를 분모로 한다.

  calculation_basis:
    unit: ["amount (APE 기준)", "policy_count"]
    note: |
      2023년 6월 보험업감독업무시행세칙 개정에 따라 공시용 유지율은
      연납화보험료(APE) 기준으로 산출. 그 이전은 보험계약금액 기준.
      건수 기준은 내부 관리지표로 병용.

  N회차별_의미:
    "13회차": "신계약 시점 기준 13개월 후 유지 비율 - 초기 판매 품질 지표"
    "25회차": "신계약 시점 기준 25개월 후 유지 비율 - IFRS17 CSM 산출 핵심 가정"
    "37회차": "신계약 시점 기준 37개월 후 유지 비율"
    "61회차": "신계약 시점 기준 61개월 후 유지 비율 - 단기납 종신 완납 직후 구간"

  critical_note: |
    오해: "13회차 분모는 13개월 이상 경과한 모든 계약"
    정답: 13회차 유지율은 13개월 전에 신계약된 코호트가 분모.

    같은 산출 시점의 13회차와 25회차는 서로 다른 가입 코호트를 본다.
    (13회차는 13개월 전 코호트, 25회차는 25개월 전 코호트)

  common_mistake: |
    SQL에서 `payment_month_seq >= 25` 조건을 분모로 잡으면 안 됨.
    이러면 25회차 생존자만 뽑히고 13회차와 25회차가 동일 집합이 되어
    낙차가 0%p로 수렴하는 오류 발생.

    정답: 분모는 `issue_date가 기준시점 - N개월 이전인 신계약 코호트` 전체.
    분자는 그 중 N회차 시점에 status='active'인 계약.

  industry_benchmark:
    "2024_상반기_생보": {"13회차": 88.3, "25회차": 75.8, "37회차": 49.4, "61회차": 43.6}
    "2021_생보_KIRI": {"13회차": 83.9, "25회차": 67.1}
    해외_참조_25회차: {"싱가포르": 96.5, "일본": 90.9, "대만": 90.0, "미국": 89.4}

  suri_schema_hint: |
    premium_payments_v.payment_month_seq 기반 계산.
    분모: policies.issue_date 기준 N개월 이전 코호트.
    분자: 해당 코호트 중 status='active' 계약 (또는 N회차 payment 존재).

  sources:
    primary:
      - "보험업감독업무시행세칙 별표 1의1 (비교공시 산출기준, 2023.6 개정)"
      - "보험업법 시행령"
    secondary:
      - "보험연구원 연구보고서 2022-13 「보험계약 유지율에 관한 연구」(김동겸·정인영, 2022)"
      - "금융위원회 2023 보험업감독규정 개정 (공시 의무화)"
      - "생명보험협회 공시실 반기 공시 (2024 상반기)"
      - "뉴스웨이 2025.11.19 「장기계약 유지율 공시 시행 2년」"


조기_해지율:
  en: early termination rate
  tier: poc_proxy_or_assumption

  definition: |
    신계약 후 초기 구간(예: 6개월 또는 12개월) 내 해지 또는 실효가
    발생한 비율. 공식 단일 산식이 아닌 분석 목적별 관찰 창(window) 설정.

  분석_패턴: "특정 시즌(예: 3월 절판) 코호트 vs 평월 코호트 A/B 비교"
  용도: "초기 판매 품질 지표, 불완전판매 감지"

  suri_schema_hint: |
    policies.issue_date 기준 코호트 정의 후
    status in ('cancelled', 'lapsed', 'void') 중
    해지일이 issue_date + N개월 이내인 계약 비율.

  sources:
    secondary:
      - "금융감독원 보험모집 경영효율분석 기준"
      - "금융위 2018 「보험모집 질서유지」 자료"


해지_및_실효:
  tier: official_definition
  note: "한국 실무에서 해지·실효·부활은 별도 상태값으로 구분"

  해지:
    en: surrender / termination
    definition: "보험계약자의 의사표시에 의해 보험계약이 종료되는 것"
    해약환급금: "지급"

  실효:
    en: lapse
    definition: "보험료 미납 등으로 계약의 효력이 상실된 상태"
    부활_가능기간: "통상 실효 후 2~3년 (약관별 상이)"
    legal_note: "상법 제650조 (보험료의 지급과 지체의 효과)"

  부활:
    en: reinstatement
    definition: "실효된 계약의 효력 회복. 미납보험료·연체이자 납입 시 가능"

  무효:
    en: void
    definition: "고지의무 위반 등으로 계약이 처음부터 효력을 인정받지 못하는 상태"

  suri_스키마_매핑:
    cancelled: "해지 (계약자 의사)"
    lapsed: "실효 (보험료 미납)"
    void: "무효"
    주의: "본 PoC 스키마는 실효/실효해지/부활 구분 없음. status='lapsed'에 혼재 가능"

  sources:
    primary:
      - "상법 제650조 (보험료의 지급과 지체의 효과)"
      - "생명보험 표준약관 제29조·제30조"
    secondary:
      - "보험업법 시행령"


해약환급금:
  en: surrender value
  tier: official_definition

  definition: |
    보험계약 해지 시 계약자에게 지급되는 금액.
    납입보험료에서 사업비·위험보험료를 차감하고 책임준비금 기준으로 산출.

  관련_이슈: |
    단기납 종신 5·7년납 완납 직후 해지 시 해약환급금이 납입액을
    상회하는 구조가 조기 해지 유인으로 작용 (61회차 유지율 급락 원인).

  suri_산출_가능_여부: "불가"
  불가_사유: "책임준비금·사업비 구조 데이터 부재"

  sources:
    primary:
      - "상법 제736조 (해지환급금의 지급)"
      - "생명보험 표준약관 제32조 (해지환급금)"


승환계약:
  en: churning / policy replacement
  tier: official_definition

  definition: |
    기존 보험계약을 부당하게 소멸시키고 새로운 보험계약을
    청약하게 하는 불건전 영업 행위. 보험업법상 금지.

  관계_지표: "특정 채널(특히 GA)의 25회차 유지율 급락의 주요 원인 가설"

  배경_지식: |
    초년도 판매수수료 환수 기간(통상 12~18개월)이 종료된 직후
    타사 상품으로 갈아태우는 관행과 연관.
    소속사 변경(보험회사↔GA) 시 부당한 승환계약이 발생하면
    기존 계약 해지로 인한 해약환급금 상당 고객손실 우려.

  critic_활용_힌트: |
    Critic이 GA 채널 낙차 크기 발견 시 단순히 "낙차가 큽니다"로
    끝내지 말고, "승환계약 리스크 의심" 도메인 통찰을 함께
    제시하도록 설계.

  sources:
    primary:
      - "보험업법 제97조 제1항 제4호 (부당한 계약전환 금지)"
    secondary:
      - "금융위 2018.10 「법인보험대리점 내부통제 방안」"


# ============================================================
# B. 보험료
# ============================================================

APE:
  en: Annual Premium Equivalent (연납화보험료)
  tier: industry_convention

  definition: |
    납입방식(월납·연납·일시납)이 서로 다른 계약들을 1년 단위
    보험료로 환산해 비교·집계하기 위한 지표.

    법령상 단일 표준 공식이 아닌, IR·공시·내부 KPI에서 널리 쓰이는
    업계 관행 지표.

  표준_환산_원칙:
    월납: "월보험료 × 12"
    연납: "연보험료 × 1"
    일시납: |
      보험사·용도별로 상이. 대표적 관행:
      - 공시·IR: 일시납 × 0.1 (10년 납입으로 환산, 영국 ABI 기준과 동일)
      - 일부 내부: 일시납 ÷ 실제 납입기간

  formula_poc: "월납 × 12 + 연납 + 일시납 × 0.1"

  용도: |
    - IFRS17 체제 신계약 규모의 표준 단위
    - 2023.6 이후 공시 유지율 산출 기준
    - 보험사 외형 성장 KPI

  suri_schema_hint: |
    monthly_ape VIEW에 월단위 집계 완료.
    또는 premium_payments 테이블에서 payment_type 기반 직접 계산.

  sources:
    primary:
      - "보험업감독업무시행세칙 별표 1의1 (2023.6 개정, 유지율 산출 APE 기준)"
    secondary:
      - "한화생명 2025년 상반기 공시자료"
      - "생명보험협회 월간생명보험통계 (신계약 APE 공시)"
      - "대한금융신문 2023.9.18 「산출방식 바꿨더니 생보 계약유지율」"


월초보험료:
  en: initial monthly premium
  tier: industry_convention
  약칭: "월초"

  definition: |
    신계약의 월납 초회보험료 (계약 첫 달 납입 보험료, 월납 기준).
    업계에서 설계사·채널·지점 성과의 표준 단위로 널리 쓰임.

  용도:
    - "설계사별/채널별/지점별 신계약 성과의 표준 단위"
    - "GA·FP 시장점유율 공시의 기준 (월초 점유율)"

  APE와의_관계: "월초 × 12 ≈ 월납 APE"

  sources:
    secondary:
      - "생명보험협회 월간생명보험통계 (신계약 월초보험료 공시)"
      - "보험저널 GA 리포트 (월초 점유율 산출)"
      - "KIRI 「생명보험사의 채널다각화가 신계약 성과에 미치는 영향」(2018)"


수입보험료:
  en: premiums received / gross written premium
  tier: official_definition

  definition: "보험계약자로부터 실제 수취한 보험료 총액"

  warning: |
    IFRS17의 보험수익(insurance revenue)과 동일 개념이 아님.
    IFRS17은 CSM 상각·보장 제공에 따라 보험수익 인식.
    수입보험료는 단순 현금 수취 기준.

  suri_schema_hint: |
    premium_payments 테이블에서 status='paid' 레코드의 amount 합계

  sources:
    primary:
      - "보험업감독업무시행세칙 제6장 (보험회계) 관련 규정"


코호트:
  en: cohort
  tier: industry_convention

  definition: |
    동일한 기준 시점(예: issue_date 월/분기/연도)에 가입한 계약 집단.
    유지율·조기해지율·절판 시즌 분석의 기초 개념.

  활용_예시:
    - "2024년 3월 가입 코호트 vs 2024년 평월 코호트 비교 (절판 효과)"
    - "2023년 1월 가입 코호트의 25회차 유지율 추이"

  sources:
    secondary:
      - "KIRI 연구보고서 2022-13 (코호트 기반 유지율 분석)"


# ============================================================
# C. 회계 (IFRS17)
# ============================================================

CSM:
  en: Contractual Service Margin (계약서비스마진)
  tier: official_definition

  official_definition: |
    보험계약집합에 대한 자산 또는 부채의 구성요소로서,
    보험계약자가 미래에 제공받을 보험계약서비스와 관련된 미실현이익.

  최초_측정_개념: |
    최초 인식시 CSM은 보험계약집합에 대해 즉시 이익이 인식되지
    않도록 측정되는 잔여 마진.

    이행현금흐름(FCF)이 순유출이면 해당 계약집합은 손실부담계약
    (onerous contract)이며 즉시 손실 인식, CSM은 0.

  후속_측정_개념: |
    매 보고기간 말 CSM은 보장단위(coverage units) 기준으로
    당기손익에 배분. 할인이자·경험조정·가정변경 등으로 재측정.

  페르소나_관점:
    상품기획자: |
      신상품 출시 시 IFRS17 수익성(CSM) 기여도 판단.
      정확한 수치는 계리팀 산출물 사용.
    계리사: "이행현금흐름 기반 공식 산출 (BEL + RA + 할인율 체계)"
    suri_범위: |
      상품기획자 관점에서 proxy 지표 제공,
      정확 산출은 계리팀 영역임을 명시.

  suri_산출_가능_여부: "불가"

  불가_사유:
    - "이행현금흐름(FCF = BEL + RA) 자체가 복수 계리 가정 필요"
    - "최선추정부채(BEL) 산출 체계 부재"
    - "위험조정(RA) 데이터 부재"
    - "할인율(무위험수익률 + 유동성 프리미엄) 정의 부재"
    - "보장단위 식별 기준 부재"

  권장_대응_graceful_degradation: |
    사용자가 CSM을 물을 경우:
    1. "본 PoC 데이터로 CSM 정식 산출 불가" 명시
    2. 대안 제시:
       - 보장성 상품 APE 규모 (CSM 상관 proxy)
       - 측정모형별 계약 건수 분포 (measurement_model 컬럼)
    3. Hallucination 금지. 정확한 수치는 계리팀 산출물 권고.

  sources:
    primary:
      - "K-IFRS 제1117호 「보험계약」 문단 38 (CSM 초기 인식)"
      - "K-IFRS 제1117호 문단 43-44 (CSM 후속 측정·상각)"
      - "IFRS Foundation IFRS 17 paragraphs 38-39"
    secondary:
      - "금감원/생보협회/손보협회 2021 「IFRS 17 시행 대비 보험감독회계 도입방안」"
      - "KIRI 연구보고서 2022-20 「IFRS17 시행에 따른 보험회계 주요 쟁점」"


BEL:
  en: Best Estimate Liability (최선추정부채)
  tier: official_definition
  definition: |
    보험계약집합 내 각 계약들의 경계 내에 있는 잔여보장요소의
    모든 미래현금흐름의 확률가중 평균의 현재가치.
  suri_산출_가능_여부: "불가 (계리 가정·할인율 체계 부재)"
  sources:
    primary:
      - "K-IFRS 제1117호 「보험계약」"


RA:
  en: Risk Adjustment (위험조정)
  tier: official_definition
  definition: |
    비금융위험(보험위험·해약위험·비용위험 등)에서 생기는
    현금흐름의 금액과 시기에 대한 불확실성을 감수하는 것에
    대하여 보험자가 요구하는 보상 금액.
  suri_산출_가능_여부: "불가 (신뢰수준법 기반 분위 차감 체계 부재)"
  sources:
    primary:
      - "K-IFRS 제1117호 문단 37"


IFRS17_측정모형:
  tier: official_definition
  note: "SURI 스키마의 policies.measurement_model 컬럼과 직접 매핑"

  GMM:
    en: General Measurement Model (일반모형)
    적용: "대부분의 장기 보험계약 (보장기간 1년 초과)"
    특징: "미래현금흐름 + 할인율 + RA + CSM의 4개 요소로 보험부채 측정"

  PAA:
    en: Premium Allocation Approach (보험료배분접근법)
    적용_조건:
      - "집합 내 각 계약의 보장기간이 1년 이내"
      - "또는 GMM과 결과가 중요하게 다르지 않을 것으로 기대"
    특징: "수취한 보험료 기반 간편 모형. 일반손보·단체보험에 주로 적용"

  VFA:
    en: Variable Fee Approach (변동수수료접근법)
    적용_조건: "직접참가특성(direct participation features) 요건 충족 계약"
    특징: "일반모형과 유사하나 시장변수 변동을 CSM에서 조정"
    주의: "모든 변액보험이 자동으로 VFA는 아님. 요건 충족 여부 확인 필요"

  suri_스키마_매핑: "policies.measurement_model 컬럼 (값: GMM/PAA/VFA/NULL)"

  sources:
    primary:
      - "K-IFRS 제1117호 「보험계약」 본문"
      - "IFRS Foundation IFRS 17"
    secondary:
      - "KIRI 연구보고서 2022-20 「IFRS17 시행에 따른 보험회계 주요 쟁점」"


지급률_proxy:
  en: Claim Ratio proxy (생보 위험손해율 대용치)
  tier: poc_proxy_or_assumption

  warning: |
    본 PoC의 지표는 K-ICS나 결산용 정식 '위험손해율'이 아닌
    현금흐름 기반 '지급률' proxy. '손해율'이라는 명칭은 지양.

  손해보험_정식_정의: "발생손해액 / 경과보험료"

  생명보험_실무: |
    생보는 단일 '손해율' 지표보다 3이원(위험률차·이자율차·사업비차)
    분해가 표준.
    '위험손해율 = 발생손해액 / 위험보험료'가 생보 1차 지표이나,
    위험보험료 분리(Unbundling) 데이터가 PoC에 부재.

  proxy_formula: "SUM(claims.claim_amount) / SUM(premium_payments.payment_amount)"

  proxy_한계:
    - "위험보험료 분리 부재로 수입보험료 전체를 분모로 사용"
    - "발생손해액(Incurred) 대신 지급보험금(Paid) 사용"
    - "사업비·준비금 변동 미반영"
    - "발생주의/현금주의 시점차 미보정"
    - "생보는 원래 3이원 분해로 분석하는 것이 표준"

  명시_표현_필수:
    - "지급률 proxy"
    - "정식 위험손해율 아닌 대용치"
    - "실무 산출이 필요하면 계리팀 위임"

  사용_시_경고: |
    수치 제시 시 반드시 'proxy' 또는 '근사치' 표현 포함.
    단독 절대 수치 제시 금지.
    상품기획 실무에서 정확한 수치가 필요하면 계리팀 산출값 사용 권고.

  sources:
    secondary:
      - "보험업감독업무시행세칙 별표 (손해율 산출 관련, 손해보험 기준)"
      - "생명보험협회 월간생명보험통계 (3이원 분석 표준)"
      - "금감원 보험회사 경영실태평가(RAAS) 해설서"


# ============================================================
# D. 판매채널
# ============================================================

판매채널:
  tier: official_definition

  방카:
    en: bancassurance
    definition: "은행 창구를 통한 보험 판매 채널"
    observed_pattern: |
      2021년 KIRI 개인생명보험 표본 기준 13→25회차 유지율 하락폭이
      전속·GA 대비 작게 나타난 경향. 시기·회사별 차이 있음.

  전속:
    en: tied agent
    definition: "특정 보험사에만 소속된 전속 설계사 채널"
    observed_pattern: |
      2021년 KIRI 개인생명보험 표본 기준 13→25회차 유지율 격차
      18.3%p 수준. 판매수당 환수시점 경과 후 해지율 상승 가설.

  GA:
    en: General Agency (법인보험대리점)
    definition: "복수 보험사 상품을 위탁 판매하는 독립 법인 대리점"
    observed_pattern: |
      2021년 KIRI 개인생명보험 표본 기준 13→25회차 유지율 격차
      20.3%p로 3개 채널 중 가장 큼. 단, 연도·상품·회사별 편차 크며
      '항상 최대'는 아님 (2023년 이후 개선 추세도 보고됨).
    구조적_요인_가설:
      - "단기 판매수수료 중심 보상구조"
      - "자회사형 GA 확대에 따른 설계사 이동 (승환계약 유인)"
      - "수수료 환수기간(12~18개월) 종료 후 해지·승환 패턴"

  TM:
    en: TeleMarketing
    definition: "전화 상담 기반 판매 채널"

  CM:
    en: Cyber Marketing
    definition: "온라인 기반 판매 채널 (홈페이지, 앱 등)"

  sources:
    primary:
      - "보험업법 시행령"
    secondary:
      - "보험연구원 연구보고서 2022-13 「보험계약 유지율에 관한 연구」(김동겸·정인영, 2022) Ⅳ장"
      - "금융위원회 2018.10 「법인보험대리점 내부통제 방안」"
      - "보험저널 2025 연간 GA 공시분석"


# ============================================================
# E. 상품유형
# ============================================================

상품유형:
  tier: official_definition
  note: |
    상품 분류는 정의 영역. IFRS17 측정 결과와 혼동 금지.
    (IFRS17 측정모형은 별도 섹션 IFRS17_측정모형 참조)

  보장성:
    en: protection-type
    definition: "위험 발생(사망·질병 등) 시에만 보험금을 지급하는 상품"
    대표_상품군: ["종신", "건강", "정기", "암", "치매"]
    IFRS17_경향: |
      일반적으로 보장성 상품은 보험위험 부담이 커 순보험료 비중이
      크고, CSM의 상대적 비중이 저축성 대비 크게 나타나는 경향.
      단, 상품설계·보증·옵션에 따라 예외 가능.

  저축성:
    en: savings-type
    definition: "만기환급금 등 저축 기능이 결합된 상품"
    대표_상품군: ["저축", "연금"]
    IFRS17_경향: |
      저축 기능으로 책임준비금(BEL) 규모가 크고,
      CSM의 상대적 비중은 보장성 대비 낮게 나타나는 경향.

  변액:
    en: variable
    definition: "보험료 일부를 투자 펀드로 운용. 투자실적 연동 상품"
    IFRS17_경향: |
      일부 변액성 계약이 direct participation features 요건을
      충족할 경우 VFA(변동수수료접근법) 대상.
      모든 변액상품이 자동으로 VFA는 아님.

  sources:
    primary:
      - "보험업법 시행령"
      - "K-IFRS 제1117호 (VFA 적용 조건)"
    secondary:
      - "신한라이프 IFRS17 전환 공시 (thebell 2024)"


# ============================================================
# F. 기타
# ============================================================

절판:
  en: end-of-lineup marketing
  tier: industry_convention

  definition: "상품 판매 종료 전 가입을 유도하는 마케팅 관행"

  대표_시즌: "3월 (회계연도 말·예정이율 변경 직전)"

  industry_가설: |
    절판 시즌 가입 코호트의 조기 해지율이 평월 대비 높다는
    업계 가설이 있으나, 공식 통계 근거는 제한적.

  suri_데이터_주입_여부: |
    본 PoC 합성 데이터에는 3월 신계약 스파이크 패턴
    (평월의 약 1.8배)이 의도적으로 주입됨. 골든셋 시나리오용.

  sources:
    secondary:
      - "보험저널·한국금융신문 절판 관련 보도"
      - "SURI 합성 데이터 설계문서 (docs/seed-plan.md)"


불완전판매:
  en: mis-selling
  tier: official_definition

  definition: |
    보험회사가 고객에게 상품 내용을 충분히 설명하지 않고
    판매하는 행위

  관련_제도: "금융소비자보호법 (2021.3 시행)"

  감지_지표_proxy: |
    13회차 유지율이 낮을수록 불완전판매 가능성 높음 (proxy).
    단, 13회차 유지율이 곧 불완전판매율은 아님.

  불완전판매비율_공식: "(민원해지건수 + 품질보증해지건수 + 무효건수) / 신계약건수"

  sources:
    primary:
      - "금융소비자보호법"
      - "보험업감독업무시행세칙 제5-11조의2, 별표 1의1 제1호"
    secondary:
      - "금융위 2018 「보험산업 신뢰회복 방안」"
