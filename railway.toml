[build]
builder = "NIXPACKS"

[deploy]
# 컨테이너 시작 시 부트스트랩 → Streamlit.
# 부트스트랩은 idempotent이라 재시작·재배포에 안전 (스키마·시드 재적용 안 함).
startCommand = "python -m scripts.railway_bootstrap && python -m streamlit run app/streamlit_app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true --browser.gatherUsageStats false"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
